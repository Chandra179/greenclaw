basePath: /
definitions:
  server.errorResponse:
    properties:
      error:
        type: string
    type: object
  server.extractRequest:
    properties:
      num_ctx:
        example: 8192
        type: integer
      styles:
        example:
        - summary
        - takeaways
        items:
          type: string
        type: array
      url:
        example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
        type: string
    required:
    - url
    type: object
  server.httpResult:
    properties:
      channel_name:
        type: string
      content:
        items:
          type: string
        type: array
      content_type:
        $ref: '#/definitions/store.ContentType'
      description:
        type: string
      duration:
        type: string
      error:
        type: string
      fetched_at: {}
      language_code:
        type: string
      links:
        items:
          type: string
        type: array
      model:
        type: string
      num_ctx:
        type: integer
      style:
        type: string
      styles:
        items:
          type: string
        type: array
      title:
        type: string
      url:
        type: string
      video_id:
        type: string
    type: object
  store.ContentType:
    enum:
    - html
    - json
    - xml
    - binary
    - youtube_video
    - youtube_playlist
    - youtube_channel
    type: string
    x-enum-varnames:
    - ContentHTML
    - ContentJSON
    - ContentXML
    - ContentBinary
    - ContentYouTubeVideo
    - ContentYouTubePlaylist
    - ContentYouTubeChannel
host: localhost:8080
info:
  contact: {}
  description: Detect-first, escalate-later web scraper with LLM processing.
  title: Greenclaw API
  version: "1.0"
paths:
  /extract:
    post:
      consumes:
      - application/json
      description: Scrapes the given URL and returns structured content. For YouTube
        URLs, also returns transcript and LLM processing results.
      parameters:
      - description: URL to extract
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.extractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.httpResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Extract content from a URL
      tags:
      - extract
  /extract/stream:
    post:
      consumes:
      - application/json
      description: Same as /extract but streams chunk-level progress events via Server-Sent
        Events while the LLM processes the transcript. Final result is sent as an
        "result" event.
      parameters:
      - description: URL to extract
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.extractRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.httpResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.errorResponse'
      summary: Extract content from a URL with SSE progress streaming
      tags:
      - extract
swagger: "2.0"
