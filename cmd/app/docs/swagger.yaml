basePath: /
definitions:
  constant.HTTPContentType:
    enum:
    - html
    - json
    - xml
    - binary
    type: string
    x-enum-varnames:
    - HTTPContentHTML
    - HTTPContentJSON
    - HTTPContentXML
    - HTTPContentBinary
  internal.errorResponse:
    properties:
      error:
        type: string
    type: object
  internal.extractRequest:
    properties:
      num_ctx:
        example: 8192
        type: integer
      styles:
        example:
        - summary
        - takeaways
        items:
          type: string
        type: array
      url:
        example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
        type: string
    required:
    - url
    type: object
  internal.graphRequest:
    properties:
      url:
        example: https://www.youtube.com/watch?v=dQw4w9WgXcQ
        type: string
    required:
    - url
    type: object
  internal.httpResult:
    properties:
      channel_name:
        type: string
      content:
        items:
          type: string
        type: array
      content_type:
        $ref: '#/definitions/constant.HTTPContentType'
      description:
        type: string
      duration:
        type: string
      error:
        type: string
      fetched_at: {}
      language_code:
        type: string
      links:
        items:
          type: string
        type: array
      model:
        type: string
      num_ctx:
        type: integer
      style:
        type: string
      styles:
        items:
          type: string
        type: array
      title:
        type: string
      url:
        type: string
      video_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Detect-first, escalate-later web scraper with LLM processing.
  title: Greenclaw API
  version: "1.0"
paths:
  /extract:
    post:
      consumes:
      - application/json
      description: Scrapes the given URL and returns structured content.
      parameters:
      - description: URL to extract
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal.extractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal.httpResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal.errorResponse'
      summary: Extract content from a URL
      tags:
      - extract
  /extract/graph:
    post:
      consumes:
      - application/json
      description: Runs entity extraction and ArangoDB graph population for a result
        that was previously processed by /extract or /extract/stream.
      parameters:
      - description: URL to index
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal.graphRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal.httpResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal.errorResponse'
      summary: Populate knowledge graph from a previously extracted URL
      tags:
      - extract
swagger: "2.0"
