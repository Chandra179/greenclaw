services:
  arangodb:
    image: arangodb:3.12
    environment:
      ARANGO_ROOT_PASSWORD:   
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3

  greenclaw:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./results:/app/results
      - ./cookies.txt:/app/cookies.txt:ro
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - arangodb

volumes:
  arangodb_data:
