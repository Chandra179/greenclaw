services:
  potato:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./results:/app/results
      - ./cookies.txt:/app/cookies.txt:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./data.db:/app/data.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
