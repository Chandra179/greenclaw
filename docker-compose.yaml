services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/greenclaw
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  greenclaw:
    build: .
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./results:/app/results
      - ./cookies.txt:/app/cookies.txt:ro
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
