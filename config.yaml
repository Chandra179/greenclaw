port: 8080
http_concurrency: 20
browser_concurrency: 5
timeout: 30s
retry_attempts: 3
recycle_after: 100

youtube:
  extract_transcripts: true
  transcript_langs: [en]
  download_audio: true
  audio_output_dir: downloads/audio
  subtitle_formats: [srt]
  subtitle_output_dir: downloads/subtitles
  transcribe_audio: true
  # cookies_from_browser: brave
  cookies_file: cookies.txt
  sleep_interval: 2
  max_sleep_interval: 5
  # player_clients: [web, mweb, android_vr, default]
  js_runtime: node
  # po_token: ""
  # user_agent: ""

llm:
  endpoint: http://host.docker.internal:11434
  model: phi4-mini:latest
  timeout: 120s
  processing_styles: [summary, takeaways]
  num_ctx: 4096

transcriber:
  endpoint: http://host.docker.internal:9000
  timeout: 5m
  language: "en"
